<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Control</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: #101a2c;
      --panel-2: #16233a;
      --text: #e7f8ff;
      --muted: #94acc6;
      --accent: #42f5d7;
      --accent-2: #ffb86c;
      --border: rgba(66, 245, 215, 0.35);
      --shadow: rgba(66, 245, 215, 0.24);
      --danger: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      font-family: "Courier New", Courier, monospace;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(66, 245, 215, 0.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 184, 108, 0.16), transparent 28%),
        linear-gradient(180deg, #0b1220 0%, #070d18 100%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.03) 50%, transparent 50%);
      background-size: 100% 4px;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.22;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, transparent 55%, rgba(0, 0, 0, 0.45) 100%);
      pointer-events: none;
    }

    .shell {
      width: min(92vw, 720px);
      border: 2px solid var(--border);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 20%),
        linear-gradient(180deg, var(--panel) 0%, #0c1424 100%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
        0 24px 80px rgba(0, 0, 0, 0.55),
        0 0 38px var(--shadow);
      padding: 28px;
      position: relative;
      isolation: isolate;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px dashed rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      pointer-events: none;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .brand {
      display: grid;
      gap: 6px;
    }

    .brand small {
      color: var(--accent-2);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-size: 0.72rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 0.95;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(66, 245, 215, 0.2);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.72rem;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: blink 1.1s steps(2, end) infinite;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }

    .screen,
    .side {
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 100%), var(--panel-2);
      padding: 20px;
    }

    .screen {
      min-height: 280px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .lcd {
      display: grid;
      gap: 10px;
      padding: 18px;
      border-radius: 16px;
      border: 1px solid rgba(66, 245, 215, 0.2);
      background: rgba(5, 12, 22, 0.85);
    }

    .lcd-label {
      color: var(--accent);
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .count {
      font-size: clamp(3.5rem, 14vw, 6.2rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--text);
      text-shadow: 0 0 16px rgba(231, 248, 255, 0.25);
    }

    .status {
      color: var(--muted);
      line-height: 1.6;
      max-width: 42ch;
      margin: 0;
    }

    .meter {
      display: grid;
      gap: 8px;
    }

    .meter-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .bar {
      height: 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .bar span {
      display: block;
      width: 18%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 14px rgba(66, 245, 215, 0.28);
      transition: width 220ms ease;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      font: inherit;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .primary {
      background: linear-gradient(180deg, #5ff6dd 0%, #27c9b2 100%);
      color: #07131f;
      box-shadow: 0 10px 24px rgba(66, 245, 215, 0.28);
    }

    .primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(66, 245, 215, 0.34);
    }

    .primary:active {
      transform: translateY(1px) scale(0.99);
    }

    .secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .secondary:hover {
      background: rgba(255, 255, 255, 0.09);
    }

    .side {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .panel-title {
      margin: 0;
      color: var(--accent-2);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    .readout {
      display: grid;
      gap: 10px;
      padding-top: 6px;
    }

    .readout div {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .readout strong {
      color: var(--text);
      font-weight: 700;
    }

    .mini {
      padding-top: 4px;
      color: var(--muted);
      line-height: 1.7;
      margin: 0;
    }

    @keyframes blink {
      50% {
        opacity: 0.25;
      }
    }

    @media (max-width: 720px) {
      .shell {
        padding: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .topline {
        margin-bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topline">
      <div class="brand">
        <small>Retro Interface</small>
        <h1>Control Deck</h1>
      </div>
      <div class="badge"><span class="dot"></span><span id="badge-text">System Ready</span></div>
    </div>

    <section class="grid">
      <div class="screen">
        <div class="lcd">
          <div class="lcd-label">Pulse Counter</div>
          <div class="count" id="count">00</div>
          <p class="status" id="status">Press the button to wake the terminal, fill the meter, and cycle the status line.</p>
        </div>

        <div class="meter">
          <div class="meter-row">
            <span>Signal</span>
            <span id="meter-label">18%</span>
          </div>
          <div class="bar" aria-hidden="true"><span id="meter-fill"></span></div>
        </div>

        <div class="actions">
          <button class="primary" id="pulse-btn" type="button">Pulse</button>
          <button class="secondary" id="reset-btn" type="button">Reset</button>
        </div>
      </div>

      <aside class="side">
        <p class="panel-title">Quick Stats</p>
        <div class="readout">
          <div><span>Mode</span><strong id="mode">Idle</strong></div>
          <div><span>Last Action</span><strong id="last">None</strong></div>
          <div><span>Terminal</span><strong>MK-I</strong></div>
        </div>
        <p class="mini">
          Tiny retro UI, nothing fancy. Just a glowing panel, a button, and a little bit of motion.
        </p>
      </aside>
    </section>
  </main>

  <script>
    const countEl = document.getElementById("count");
    const statusEl = document.getElementById("status");
    const badgeText = document.getElementById("badge-text");
    const meterFill = document.getElementById("meter-fill");
    const meterLabel = document.getElementById("meter-label");
    const modeEl = document.getElementById("mode");
    const lastEl = document.getElementById("last");
    const pulseBtn = document.getElementById("pulse-btn");
    const resetBtn = document.getElementById("reset-btn");

    const messages = [
      "SYS READY",
      "SIGNAL LOCKED",
      "COOLANT STABLE",
      "ARRAY BRIGHT",
      "CHANNEL OPEN"
    ];

    const initialStatus = "Press the button to wake the terminal, fill the meter, and cycle the status line.";
    let count = 0;

    function render() {
      const value = String(count % 100).padStart(2, "0");
      const fill = Math.min(18 + count * 9, 100);
      const message = count === 0 ? "SYSTEM READY" : messages[count % messages.length];

      countEl.textContent = value;
      statusEl.textContent = count === 0
        ? initialStatus
        : `Pulse ${count}. ${message.toLowerCase().replace(/^\w/, (letter) => letter.toUpperCase())}.`;
      badgeText.textContent = message;
      modeEl.textContent = count === 0 ? "Idle" : "Active";
      lastEl.textContent = count === 0 ? "None" : `Pulse ${count}`;
      meterFill.style.width = `${fill}%`;
      meterLabel.textContent = `${fill}%`;
    }

    pulseBtn.addEventListener("click", () => {
      count += 1;
      render();
    });

    resetBtn.addEventListener("click", () => {
      count = 0;
      render();
    });

    render();
  </script>
</body>
</html>
